<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>时区模拟器</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
  <h2>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"></path>
      <path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"></path>
    </svg>
    时区模拟器
  </h2>
  <p id="currentMode">当前模式: 系统时间模式</p>
  <div class="slider-container">
    <input type="range" id="timeSlider" min="0" max="1439" step="1">
    <div class="ticks">
      <span>0:00</span><span>3:00</span><span>6:00</span><span>9:00</span><span>12:00</span>
      <span>15:00</span><span>18:00</span><span>21:00</span><span>24:00</span>
    </div>
  </div>
  <button id="toggleFreeze">回到系统时间</button>
  <p id="selectedTime"></p>
  <div class="table-wrapper">
    <table id="timeTable">
      <thead>
        <tr><th>UTC时区</th><th>代表城市/州</th><th>Time</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
    <script src="script.js"></script>

</body>
</html>
